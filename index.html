<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nemotron 3 Super Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="chat-container">
        <header>
            <h1>Nemotron 3 Super</h1>
            <div class="status-indicator">Online</div>
        </header>
        <div id="messages" class="message-area">
            </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Scrivi un messaggio..." autocomplete="off">
            <button id="send-btn">
                Invia
            </button>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="debug-console.js"></script>
    <script src="model-selector.js"></script>
</body>
</html>
